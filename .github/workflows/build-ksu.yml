name: Build Kernel ReSukiSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 0

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y clang lld llvm
          mkdir -p source/out

      - name: Debug Source Structure
        run: |
          cd source
          echo "--- Liste des répertoires à la racine de source ---"
          ls -F
          echo "--- Recherche récursive du Makefile racine ---"
          # On cherche un fichier qui contient 'VERSION =' (la signature du noyau)
          find . -type f -name "Makefile" -exec grep -l "VERSION =" {} + 

      - name: Configure Kernel
        run: |
          cd source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LD=ld.lld
          
          # Chargement de la config
          make O=out ARCH=arm64 vendor/lito-perf_defconfig
          
          # Activation de KSU
          echo "CONFIG_KSU=y" >> out/.config
          
          # Désactivation LTO (Source fréquente de bugs de linkage)
          sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/' out/.config
          echo "CONFIG_LTO_NONE=y" >> out/.config
          
          make O=out ARCH=arm64 olddefconfig

      - name: Compile Kernel
        run: |
          cd source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LD=ld.lld
          
          make O=out ARCH=arm64 -j$(nproc) LLVM=1 LLVM_IAS=1 Image
