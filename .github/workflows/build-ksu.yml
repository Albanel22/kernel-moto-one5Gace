name: Build Kernel with KSU and SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y bc bison build-essential curl flex g++-aarch64-linux-gnu gcc-aarch64-linux-gnu git libssl-dev clang lld llvm zip

      - name: Apply KSU and SUSFS
        run: |
          cd source
          
          # 1. Clonage des modules
          git clone https://github.com/ReSukiSU/ReSukiSU KSU
          git clone https://gitlab.com/simonpunk/susfs4ksu susfs
          
          # 2. Intégration KSU
          cp -r KSU/kernel drivers/kernelsu
          
          # 3. Intégration SUSFS (copie précise)
          cp -r $(find susfs -type d -name "fs" | head -n 1)/* fs/
          cp -r $(find susfs -type d -name "linux" | grep "include" | head -n 1)/* include/linux/
          
          # 4. Patchs manuels de sécurité (indispensable pour SM8250)
          echo "obj-\$(CONFIG_KSU) += kernelsu/" >> drivers/Makefile
          sed -i "/endmenu/i\source \"drivers/kernelsu/Kconfig\"" drivers/Kconfig

      - name: Compile Kernel
        run: |
          cd source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          mkdir -p out
          # Utilisation du chemin confirmé par notre test précédent
          make O=out ARCH=arm64 kiev-perf_defconfig
          
          # Injection configuration
          echo "CONFIG_KSU=y" >> out/.config
          echo "CONFIG_KSU_SUSFS=y" >> out/.config
          
          # Compilation
          make O=out ARCH=arm64 -j$(nproc)
