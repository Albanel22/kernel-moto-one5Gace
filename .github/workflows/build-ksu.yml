name: Build Kernel ReSukiSU + SUSFS (Final Corrected)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      CC: clang
      LLVM: 1
      LLVM_IAS: 1

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_motorola_sm8250
          ref: lineage-23.2
          path: source
          fetch-depth: 0

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y clang lld llvm
          mkdir -p source/out

      - name: Auto-Integration
        run: |
          cd source
          # 1. KernelSU
          git clone --depth 1 https://github.com/ReSukiSU/ReSukiSU KernelSU
          sed -i '1i obj-y += KernelSU/' Makefile
          
          # 2. Cloner susfs4ksu
          git clone --depth 1 https://gitlab.com/simonpunk/susfs4ksu.git susfs_repo
          
          # 3. Localisation et déplacement
          SUSFS_SRC=$(find susfs_repo -name "susfs.c" | head -n 1)
          cp "$SUSFS_SRC" fs/
          
          # 4. Patchs manuels
          echo "obj-y += susfs.o" >> fs/Makefile
          
          # 5. Préparation headers
          find susfs_repo -name "*.h" -exec cp {} include/linux/ \;

      - name: Patch manquant path_umount
        run: |
          cd source
          # On remplace la déclaration externe par une fonction wrapper qui pointe vers ksys_umount
          # ksys_umount est la version standard pour démonter un path dans le noyau 4.19
          sed -i 's|extern int path_umount(struct path \*path, int flags);|#include <linux/namei.h>\n#include <linux/mount.h>\n\nstatic inline int path_umount(struct path *path, int flags) {\n    return ksys_umount(path->dentry->d_name.name, flags);\n}|' fs/susfs.c

      - name: Configure Kernel
        run: |
          cd source
          make O=out ARCH=arm64 vendor/lito-perf_defconfig
          ./scripts/config --file out/.config -e CONFIG_KSU -e CONFIG_KSU_SUSFS
          sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/' out/.config
          echo "CONFIG_LTO_NONE=y" >> out/.config
          make O=out ARCH=arm64 olddefconfig

      - name: Compile Kernel
        run: |
          cd source
          make O=out ARCH=arm64 -j$(nproc) Image

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-ReSukiSU-SUSFS-Final
          path: source/out/arch/arm64/boot/Image
