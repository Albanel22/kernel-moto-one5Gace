name: Build Kernel ReSukiSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 0

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y clang lld llvm
          mkdir -p source/out

      - name: Integrate ReSukiSU
        run: |
          # On cherche où est le vrai dossier contenant le Makefile
          find . -name "Makefile" | grep "Makefile"
          
          # On se place dans le dossier qui contient le Makefile (probablement dans source/...)
          cd $(find . -maxdepth 2 -name "Makefile" -exec dirname {} \;)
          
          # Clone du fork ReSukiSU à la racine du noyau
          git clone https://github.com/ReSukiSU/ReSukiSU KernelSU
          
          # 1. Patch du Makefile principal (trouvé dynamiquement)
          sed -i '1i obj-y += KernelSU/' Makefile
          
          # 2. Patch manuel du hook scheduler
          # On cible le fichier core.c via une recherche pour être sûr du chemin
          CORE_C=$(find . -name "core.c" | grep "sched/core.c")
          
          sed -i '/#include <linux\/sched\/rt.h>/a #include "../KernelSU/kernel/ksu.h"' $CORE_C
          sed -i '/context_switch(rq, prev, next);/i \    ksu_handle_trace_sched_switch(prev, next);' $CORE_C

      - name: Configure Kernel
        run: |
          cd source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LD=ld.lld
          
          # Chargement de la config
          make O=out ARCH=arm64 vendor/lito-perf_defconfig
          
          # Activation de KSU
          echo "CONFIG_KSU=y" >> out/.config
          
          # Désactivation LTO (Source fréquente de bugs de linkage)
          sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/' out/.config
          echo "CONFIG_LTO_NONE=y" >> out/.config
          
          make O=out ARCH=arm64 olddefconfig

      - name: Compile Kernel
        run: |
          cd source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LD=ld.lld
          
          make O=out ARCH=arm64 -j$(nproc) LLVM=1 LLVM_IAS=1 Image
