name: Build Kernel ReSukiSU + SUSFS (Pro)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      CC: clang
      CLANG_TRIPLE: aarch64-linux-gnu-
      LD: ld.lld
      LLVM: 1
      LLVM_IAS: 1

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_motorola_sm8250
          ref: lineage-23.2
          path: source
          fetch-depth: 0

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y clang lld llvm
          mkdir -p source/out

      - name: Prepare Dependencies
        run: |
          cd source
          # 1. Cloner KernelSU
          git clone --depth 1 https://github.com/ReSukiSU/ReSukiSU KernelSU
          
          # 2. Cloner susfs4ksu pour récupérer le patch
          git clone --depth 1 https://gitlab.com/simonpunk/susfs4ksu.git susfs_repo
          
          # 3. Appliquer le patch spécifique 4.19
          # On copie le patch depuis le repo clone vers la racine source
          cp susfs_repo/kernel_patches/50_add_susfs_in_kernel-4.19.patch .
          git apply 50_add_susfs_in_kernel-4.19.patch
          
          # 4. Copier les fichiers sources de susfs nécessaires
          cp -r susfs_repo/kernel_source/* .
          
          # 5. Patch du Makefile pour inclure susfs
          sed -i '1i obj-y += KernelSU/' Makefile
          echo "obj-y += susfs.o" >> Makefile

      - name: Configure Kernel
        run: |
          cd source
          make O=out ARCH=arm64 vendor/lito-perf_defconfig
          ./scripts/config --file out/.config -e CONFIG_KSU -e CONFIG_KSU_SUSFS
          sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/' out/.config
          echo "CONFIG_LTO_NONE=y" >> out/.config
          make O=out ARCH=arm64 olddefconfig

      - name: Compile Kernel
        run: |
          cd source
          make O=out ARCH=arm64 -j$(nproc) Image

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-ReSukiSU-SUSFS-4.19
          path: source/out/arch/arm64/boot/Image
