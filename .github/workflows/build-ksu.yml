name: Build Kernel with KSU and SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y bc bison build-essential curl flex g++-aarch64-linux-gnu gcc-aarch64-linux-gnu git libssl-dev clang lld llvm zip

      - name: Setup Sources
        run: |
          # 1. Téléchargement des sources
          git clone https://github.com/LineageOS/android_kernel_motorola_sm8250 --depth=1 -b lineage-23.2 source
          git clone https://github.com/ReSukiSU/ReSukiSU KSU
          git clone https://gitlab.com/simonpunk/susfs4ksu susfs
          
          # 2. Intégration KSU
          cp -r KSU/kernel source/drivers/kernelsu
          
          # 3. Intégration dynamique SUSFS
          FS_DIR=$(find susfs -type d -name "fs" | head -n 1)
          cp -r $FS_DIR/* source/fs/
          
          LINUX_DIR=$(find susfs -type d -name "linux" | grep "include" | head -n 1)
          cp -r $LINUX_DIR/* source/include/linux/
          
          # 4. Patchs manuels
          cd source
          echo "obj-\$(CONFIG_KSU) += kernelsu/" >> drivers/Makefile
          sed -i "/endmenu/i\source \"drivers/kernelsu/Kconfig\"" drivers/Kconfig

      - name: Compile Kernel
        run: |
          cd source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          mkdir -p out
          # Configuration
          make O=out ARCH=arm64 kiev-perf_defconfig
          
          # Injection des options
          echo "CONFIG_KSU=y" >> out/.config
          echo "CONFIG_KSU_SUSFS=y" >> out/.config
          
          # Compilation
          make O=out ARCH=arm64 -j$(nproc)
