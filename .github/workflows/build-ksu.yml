name: Build Kernel ReSukiSU + SUSFS (Full Patch)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      CC: clang
      LLVM: 1
      LLVM_IAS: 1

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_motorola_sm8250
          ref: lineage-23.2
          path: source
          fetch-depth: 0

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y clang lld llvm
          mkdir -p source/out

      - name: Apply SUSFS Patch
        run: |
          cd source
          # 1. Installer KernelSU
          git clone --depth 1 https://github.com/ReSukiSU/ReSukiSU KernelSU
          sed -i '1i obj-y += KernelSU/' Makefile
          
          # 2. Télécharger le patch officiel 4.19
          wget https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.19.patch
          
          # 3. Application du patch avec vérification
          git apply --ignore-whitespace susfs_patch_to_4.19.patch

      - name: Configure Kernel
        run: |
          cd source
          make O=out ARCH=arm64 vendor/lito-perf_defconfig
          ./scripts/config --file out/.config -e CONFIG_KSU -e CONFIG_KSU_SUSFS
          sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/' out/.config
          echo "CONFIG_LTO_NONE=y" >> out/.config
          make O=out ARCH=arm64 olddefconfig

      - name: Compile Kernel
        run: |
          cd source
          make O=out ARCH=arm64 -j$(nproc) Image

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-ReSukiSU-SUSFS-Final
          path: source/out/arch/arm64/boot/Image
