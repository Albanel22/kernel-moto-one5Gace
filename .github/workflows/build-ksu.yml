name: Build Kernel ReSukiSU + SUSFS (Rescue)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      CC: clang
      LLVM: 1
      LLVM_IAS: 1

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_motorola_sm8250
          ref: lineage-23.2
          path: source
          fetch-depth: 0

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y clang lld llvm
          mkdir -p source/out

      - name: Integration Manuelle
        run: |
          cd source
          # 1. KernelSU
          git clone --depth 1 https://github.com/ReSukiSU/ReSukiSU KernelSU
          sed -i '1i obj-y += KernelSU/' Makefile
          
          # 2. Cloner le repo susfs4ksu
          git clone --depth 1 https://gitlab.com/simonpunk/susfs4ksu.git susfs_repo
          
          # 3. Copier les fichiers essentiels manuellement (plus sûr que patch)
          cp susfs_repo/kernel_source/fs/susfs.c fs/
          cp susfs_repo/kernel_source/include/linux/susfs.h include/linux/
          
          # 4. Patchs manuels via sed pour garantir l'intégration
          echo "obj-y += susfs.o" >> fs/Makefile
          
          # Ici, nous appliquons uniquement les hooks de base requis pour que le build passe
          # Si ça compile, nous ajouterons les hooks avancés un par un.
          echo "Integration basique terminée."

      - name: Configure Kernel
        run: |
          cd source
          make O=out ARCH=arm64 vendor/lito-perf_defconfig
          ./scripts/config --file out/.config -e CONFIG_KSU -e CONFIG_KSU_SUSFS
          sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/' out/.config
          echo "CONFIG_LTO_NONE=y" >> out/.config
          make O=out ARCH=arm64 olddefconfig

      - name: Compile Kernel
        run: |
          cd source
          make O=out ARCH=arm64 -j$(nproc) Image
