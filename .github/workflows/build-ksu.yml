name: Build Kernel with KSU and SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y bc bison build-essential curl flex g++-aarch64-linux-gnu gcc-aarch64-linux-gnu git libssl-dev clang lld llvm zip

      - name: Clone Sources
        run: |
          # Clonage de la base (même méthode que votre baseline)
          git clone https://github.com/LineageOS/android_kernel_motorola_sm8250 --depth=1 -b lineage-23.2 source
          
          # Clonage des modules dans des dossiers séparés
          git clone https://github.com/ReSukiSU/ReSukiSU KSU
          git clone https://gitlab.com/simonpunk/susfs4ksu susfs

      - name: Patch Kernel
        run: |
          # Diagnostic : on regarde ce qu'il y a dans les dossiers clonés
          echo "Contenu de susfs :"
          ls -R ../susfs
          
          cd source
          # Intégration KSU
          cp -r ../KSU/kernel drivers/kernelsu
          
          # Intégration SUSFS : on copie tout ce qui est dans le dossier susfs vers le noyau
          # S'il y a des sous-dossiers, on les prend tous
          cp -r ../susfs/* .
          
          # Patchs nécessaires
          echo "obj-\$(CONFIG_KSU) += kernelsu/" >> drivers/Makefile
          sed -i "/endmenu/i\source \"drivers/kernelsu/Kconfig\"" drivers/Kconfig


      - name: Compile Kernel
        run: |
          cd source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          mkdir -p out
          
          # Utilisation du chemin exact trouvé par votre baseline
          make O=out ARCH=arm64 vendor/kiev-perf_defconfig
          
          # Injection des options
          echo "CONFIG_KSU=y" >> out/.config
          echo "CONFIG_KSU_SUSFS=y" >> out/.config
          
          # Compilation
          make O=out ARCH=arm64 -j$(nproc)
