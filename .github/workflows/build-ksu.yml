name: Build Kernel ReSukiSU + SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      CC: clang
      CLANG_TRIPLE: aarch64-linux-gnu-
      LD: ld.lld
      LLVM: 1
      LLVM_IAS: 1

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_motorola_sm8250
          ref: lineage-23.2
          path: source
          fetch-depth: 0

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y clang lld llvm unzip
          mkdir -p source/out

      - name: Download Dependencies
        run: |
          cd source
          # 1. KernelSU
          curl -L -o ksu.zip https://github.com/ReSukiSU/ReSukiSU/archive/refs/heads/main.zip
          unzip ksu.zip
          mv ReSukiSU-main KernelSU
          rm ksu.zip
          
          # 2. SUSFS (Version officielle simonpunk)
          curl -L -o susfs.zip https://gitlab.com/simonpunk/susfs4ksu/-/archive/main/susfs4ksu-main.zip
          unzip susfs.zip
          mv susfs4ksu-main susfs
          rm susfs.zip
          
          echo "--- Vérification ---"
          ls -F KernelSU/
          ls -F susfs/


      - name: Apply Patches
        run: |
          cd source
          sed -i '1i obj-y += KernelSU/' Makefile
          
          # Application des Hooks SUSFS (fs/stat.c)
          sed -i '/SYSCALL_DEFINE2(newlstat/i #ifdef CONFIG_KSU_MANUAL_HOOK\n__attribute__((hot))\nextern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);\nextern void ksu_handle_newfstat_ret(unsigned int *fd, struct stat __user **statbuf_ptr);\n#if defined(__ARCH_WANT_STAT64) || defined(__ARCH_WANT_COMPAT_STAT64)\nextern void ksu_handle_fstat64_ret(unsigned long *fd, struct stat64 __user **statbuf_ptr);\n#endif\n#endif\n' fs/stat.c
          sed -i '/error = vfs_fstatat(dfd, filename, \&stat, flag);/i #ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_stat(&dfd, &filename, &flag);\n#endif' fs/stat.c
          
          # Patch fs/open.c
          sed -i '/long do_faccessat/i #ifdef CONFIG_KSU_MANUAL_HOOK\n__attribute__((hot))\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);\n#endif\n' fs/open.c
          sed -i '/return do_faccessat(dfd, filename, mode);/i #ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n#endif' fs/open.c
          
          # Patch drivers/input/input.c
          sed -i '/void input_event/i #ifdef CONFIG_KSU_MANUAL_HOOK\nextern bool ksu_input_hook __read_mostly;\nextern __attribute__((cold)) int ksu_handle_input_handle_event(unsigned int *type, unsigned int *code, int *value);\n#endif\n' drivers/input/input.c
          sed -i '/unsigned long flags;/a #ifdef CONFIG_KSU_MANUAL_HOOK\n\tif (unlikely(ksu_input_hook))\n\t\tksu_handle_input_handle_event(&type, &code, &value);\n#endif' drivers/input/input.c
          
          # Patch fs/read_write.c
          sed -i '/ssize_t ksys_read/a #ifdef CONFIG_KSU_MANUAL_HOOK\nextern bool ksu_init_rc_hook __read_mostly;\nextern __attribute__((cold)) int ksu_handle_sys_read(unsigned int fd, char __user **buf_ptr, size_t *count_ptr);\n#endif' fs/read_write.c
          sed -i '/return ksys_read(fd, buf, count);/i #ifdef CONFIG_KSU_MANUAL_HOOK\n\tif (unlikely(ksu_init_rc_hook)) \n\t\tksu_handle_sys_read(fd, &buf, &count);\n#endif' fs/read_write.c
          
          # Patch visibilité SELinux
          sed -i 's/static ssize_t (\*write_op\[\])/ssize_t (*write_op[])/' security/selinux/selinuxfs.c
          sed -i 's/static const struct file_operations sel_handle_status_ops/const struct file_operations sel_handle_status_ops/' security/selinux/selinuxfs.c
          sed -i 's/static struct security_operations selinux_ops/struct security_operations selinux_ops/' security/selinux/hooks.c

      - name: Configure Kernel
        run: |
          cd source
          make O=out ARCH=arm64 vendor/lito-perf_defconfig
          ./scripts/config --file out/.config -e CONFIG_KSU -e CONFIG_KSU_MANUAL_HOOK -e CONFIG_KSU_SUSFS
          sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/' out/.config
          echo "CONFIG_LTO_NONE=y" >> out/.config
          make O=out ARCH=arm64 olddefconfig

      - name: Compile Kernel
        run: |
          cd source
          make O=out ARCH=arm64 -j$(nproc) Image

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-ReSukiSU-SUSFS
          path: source/out/arch/arm64/boot/Image
