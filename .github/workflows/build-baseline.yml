name: Test Compile Base Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y bc bison build-essential curl flex g++-aarch64-linux-gnu gcc-aarch64-linux-gnu git libssl-dev clang lld llvm zip

      - name: Clone Sources
        run: |
          git clone https://github.com/LineageOS/android_kernel_motorola_sm8250 --depth=1 -b lineage-23.2 source

      - name: Compile Base Kernel
        run: |
          cd source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          # Force l'utilisation du linker LLD de LLVM
          export LD=ld.lld
          export LD_LIBRARY_PATH=/usr/lib/llvm-14/lib # Ajustez si nécessaire selon l'image
          
          mkdir -p out
          make O=out ARCH=arm64 vendor/lito-perf_defconfig
          
          # On ajoute LLD=1 pour forcer le link avec lld
          # On ajoute CONFIG_LTO_NONE=y pour éviter les conflits de taille de code
          cat >> out/.config <<EOF
          CONFIG_LTO_NONE=y
          EOF
          
          make O=out ARCH=arm64 olddefconfig
          
          # Compilation avec LLD=1
          make O=out ARCH=arm64 -j$(nproc) LLVM=1 LLVM_IAS=1 LLD=1

