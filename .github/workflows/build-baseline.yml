name: Baseline Kernel Build (No Mods)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y bc bison build-essential curl flex g++-aarch64-linux-gnu gcc-aarch64-linux-gnu git libssl-dev clang lld llvm zip

      - name: Clone Sources
        run: |
          git clone https://github.com/LineageOS/android_kernel_motorola_sm8250 --depth=1 -b lineage-23.2 source

      - name: Compile Baseline
        run: |
          # 1. Diagnostic : On affiche où on est et ce qu'il y a dans les dossiers
          pwd
          ls -R arch/arm64/configs/ | grep "kiev" || echo "Fichier introuvable"
          
          # Si le fichier existe, on récupère son chemin exact
          find . -name "*kiev*defconfig"
          
          # 2. On attend votre réponse avec le résultat de ces commandes
          echo "Arrêt volontaire pour diagnostic"
          exit 1

