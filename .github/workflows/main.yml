name: Build Kernel

on:
  workflow_dispatch:

env:
  KERNEL_REPO: https://github.com/LineageOS/android_kernel_motorola_sm8250
  KERNEL_BRANCH: lineage-23.2
  KERNEL_DEFCONFIG: vendor/kona-perf_defconfig
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel-source

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git flex bison gperf build-essential libncurses5-dev libssl-dev bc libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip

      - name: Build Kernel
        run: |
          cd kernel-source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make ${{ env.KERNEL_DEFCONFIG }}
          make -j$(nproc)

      - name: Package Kernel
        run: |
          git clone ${{ env.ANYKERNEL_REPO }} AnyKernel3
          cp kernel-source/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Output
          path: AnyKernel3/*
