name: Build Kernel

on:
  workflow_dispatch:

env:
  KERNEL_REPO: LineageOS/android_kernel_motorola_sm8250
  KERNEL_BRANCH: lineage-23.2
  KERNEL_DEFCONFIG: vendor/kona-perf_defconfig
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel-source

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          # Ajout de 'gawk' pour la commande grep -P (Perl-regex) et 'coreutils' pour realpath
          sudo apt-get install -y git flex bison build-essential libssl-dev bc clang lld llvm binutils-aarch64-linux-gnu gawk

      - name: Patch ReSukiSU
        run: |
          cd kernel-source
          # On télécharge le script
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" > setup.sh
          # On le rend exécutable
          chmod +x setup.sh
          # On l'exécute
          ./setup.sh

      - name: Build Kernel
        run: |
          cd kernel-source
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # IMPORTANT : Il faut activer CONFIG_KSU dans ton fichier defconfig 
          # si ce n'est pas déjà fait par le script setup.sh
          echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
          
          make ${{ env.KERNEL_DEFCONFIG }}
          make -j$(nproc) CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-

      - name: Package Kernel
        run: |
          git clone ${{ env.ANYKERNEL_REPO }} AnyKernel3
          cp kernel-source/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-ReSukiSU-Output
          path: AnyKernel3/*
