name: Build ReSukiSU Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-aarch64-linux-gnu gcc-aarch64-linux-gnu git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Setup Proton-Clang
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang /opt/proton-clang-master

      - name: Patch & Build Kernel
        run: |
          # 1. Nettoyage initial
          make clean && make mrproper
          
          # 2. Application du patch ReSukiSU 
          # Remplace cette ligne par la commande réelle de ton script de patch
          # Exemple: bash scripts/setup_resukisu.sh
          
          # 3. Génération de la configuration (Kona)
          make ARCH=arm64 ${{ env.KERNEL_DEFCONFIG }}
          
          # 4. Désactivation des options conflictuelles (LTO/CFI/Shadow)
          scripts/config --disable LTO
          scripts/config --disable CFI_CLANG
          scripts/config --disable SHADOW_CALL_STACK
          
          # 5. Activation de ReSukiSU
          echo "CONFIG_KSU=y" >> .config
          
          # 6. Lancer la compilation
          export PATH=/opt/proton-clang-master/bin:$PATH
          make -j$(nproc) ARCH=arm64 \
          CC=clang \
          LD=ld.lld \
          LLVM=1 \
          LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu-

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image
          path: out/arch/arm64/boot/Image.gz-dtb
