name: Build Kernel

on:
  workflow_dispatch:

env:
  KERNEL_REPO: LineageOS/android_kernel_motorola_sm8250
  KERNEL_BRANCH: lineage-23.2
  KERNEL_DEFCONFIG: vendor/kona-perf_defconfig
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3
  RESUKISU_PATCH_URL: https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel-source

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git flex bison build-essential libssl-dev bc clang lld llvm binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu gawk

      - name: Patch ReSukiSU
        run: |
          cd kernel-source
          curl -LSs "${{ env.RESUKISU_PATCH_URL }}" > setup.sh
          chmod +x setup.sh
          ./setup.sh

      - name: Build Kernel
        run: |
          cd kernel-source
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Activation de KernelSU dans la configuration
          echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
          
          make ${{ env.KERNEL_DEFCONFIG }} CC=clang CLANG_TRIPLE=aarch64-linux-gnu-
          # Compilation avec -j1 pour éviter les erreurs de build sur techpack/display
          make -j1 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-

      - name: Package Kernel
        run: |
          git clone ${{ env.ANYKERNEL_REPO }} AnyKernel3
          cp kernel-source/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-ReSukiSU-Output
          path: AnyKernel3/*
