make: Build ReSukiSU Kernel

on:
  push:
    branches: [ lineage-23.2 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_kernel_motorola_sm8250'
          ref: 'lineage-23.2'
          submodules: 'recursive'

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu git gnupg gperf imagemagick libelf-dev liblz4-tool libncurses-dev \
            libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc \
            zip zlib1g-dev libc6-dev-i386 lib32ncurses-dev lld libfl-dev libbison-dev

      - name: Setup Toolchain
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang /opt/proton-clang

      - name: Inject and Setup ReSukiSU
        run: |
          cat << 'EOF' > setup_resukisu.sh
          #!/bin/sh
          set -eu
          GKI_ROOT=$(pwd)
          if test -d "$GKI_ROOT/common/drivers"; then DRIVER_DIR="$GKI_ROOT/common/drivers"; else DRIVER_DIR="$GKI_ROOT/drivers"; fi
          DRIVER_MAKEFILE="$DRIVER_DIR/Makefile"
          DRIVER_KCONFIG="$DRIVER_DIR/Kconfig"
          
          echo "[+] Setting up ReSukiSU..."
          git clone https://github.com/ReSukiSU/ReSukiSU KernelSU
          
          # Force le mode compatible Non-GKI
          sed -i 's/CONFIG_KSU_TP_REDIRECT=y/CONFIG_KSU_TP_REDIRECT=n/g' "$GKI_ROOT/KernelSU/kernel/Makefile" 2>/dev/null || true
          
          # Intégration
          cd "$DRIVER_DIR"
          ln -sf "$(realpath --relative-to="$DRIVER_DIR" "$GKI_ROOT/KernelSU/kernel")" "kernelsu"
          grep -q "kernelsu" "$DRIVER_MAKEFILE" || printf "\nobj-\$(CONFIG_KSU) += kernelsu/\n" >> "$DRIVER_MAKEFILE"
          grep -q "source \"drivers/kernelsu/Kconfig\"" "$DRIVER_KCONFIG" || sed -i "/endmenu/i\source \"drivers/kernelsu/Kconfig\"" "$DRIVER_KCONFIG"
          EOF
          chmod +x setup_resukisu.sh
          ./setup_resukisu.sh

      - name: Build Kernel
        run: |
          make clean && make mrproper
          
          # 1. Supprimer le dossier VDSO32 problématique avant toute chose
          # Cela empêchera le Makefile de tenter de compiler ces fichiers incompatibles
          rm -rf arch/arm64/kernel/vdso32
          
          mkdir -p bin_host
          ln -sf /usr/bin/gcc bin_host/gcc
          ln -sf /usr/bin/g++ bin_host/g++
          ln -sf /usr/bin/ld bin_host/ld
          
          make ARCH=arm64 vendor/kona-perf_defconfig
          
          # Injection des options vitales
          echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
          echo "CONFIG_KSU_LKM=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
          
          # Remplace 'make alldefconfig' par ceci pour forcer la vérification :
          make ARCH=arm64 alldefconfig
          make ARCH=arm64 olddefconfig || make ARCH=arm64 menuconfig

          
          export PATH=$(pwd)/bin_host:/opt/proton-clang/bin:$PATH
          
          # Compilation
          make -j$(nproc) ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            HOSTCC=gcc \
            HOSTCXX=g++ \
            HOSTLD=ld \
            KBUILD_HOSTLD=/usr/bin/ld \
            LD=ld.lld \
            LLVM=1 \
            LLVM_IAS=1

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image-Kiev
          path: out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: warn
