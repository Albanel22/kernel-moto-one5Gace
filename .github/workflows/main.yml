name: Build Kernel

on:
  workflow_dispatch:

env:
  KERNEL_REPO: LineageOS/android_kernel_motorola_sm8250
  KERNEL_BRANCH: lineage-23.2
  KERNEL_DEFCONFIG: vendor/kona-perf_defconfig
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3
  RESUKISU_PATCH_URL: https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh
  TOOLCHAIN_URL: https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel-source

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git flex bison build-essential libssl-dev bc binutils-aarch64-linux-gnu gawk
          # Installation de la toolchain Proton-Clang
          curl -LSs "${{ env.TOOLCHAIN_URL }}" | tar -xz -C /opt
          echo "PATH=/opt/proton-clang-master/bin:$PATH" >> $GITHUB_ENV

      - name: Patch ReSukiSU
        run: |
          cd kernel-source
          curl -LSs "${{ env.RESUKISU_PATCH_URL }}" > setup.sh
          chmod +x setup.sh
          ./setup.sh

      - name: Build Kernel
        run: |
          cd kernel-source
          # Préparation des variables d'environnement
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH=/opt/proton-clang-master/bin:$PATH
          
          # Cross-compilation (Cible ARM64)
          export CC=clang
          export LD=ld.lld
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Outils hôtes (Serveur x86_64) - Indispensable pour éviter les conflits
          export HOSTCC=gcc
          export HOSTLD=ld
          
          # Nettoyage profond
          make clean
          make mrproper
          
          # Activation de KernelSU
          echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
          
          # Configuration et compilation
          make ${{ env.KERNEL_DEFCONFIG }} CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 HOSTCC=gcc HOSTLD=ld
          make -j$(nproc) CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 HOSTCC=gcc HOSTLD=ld KCFLAGS="-w"

      - name: Package Kernel
        run: |
          git clone ${{ env.ANYKERNEL_REPO }} AnyKernel3
          cp kernel-source/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-ReSukiSU-Output
          path: AnyKernel3/*
