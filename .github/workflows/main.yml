name: Build ReSukiSU Kernel

on:
  push:
    branches: [ lineage-23.2 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_kernel_motorola_sm8250'
          ref: 'lineage-23.2'
          submodules: 'recursive'

      - name: Setup Build Environment
        run: |
          sudo apt update && sudo apt install -y git device-tree-compiler lz4 xz-utils zlib1g-dev \
            openjdk-17-jdk gcc g++ python3 python-is-python3 p7zip-full android-sdk-libsparse-utils \
            erofs-utils default-jdk gnupg flex bison gperf build-essential zip curl libc6-dev \
            libncurses-dev libx11-dev libreadline-dev libgl1 libgl1-mesa-dev make bc grep \
            tofrodos python3-markdown libxml2-utils xsltproc libc6-dev libtinfo6 repo cpio \
            kmod openssl libelf-dev pahole libssl-dev libarchive-tools zstd rsync

      - name: Setup Toolchain
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang /opt/proton-clang

      - name: Inject and Setup ReSukiSU
        run: |
          cat << 'EOF' > setup_resukisu.sh
          #!/bin/sh
          set -eu
          GKI_ROOT=$(pwd)
          DRIVER_DIR="$GKI_ROOT/drivers"
          # Définition manquante ajoutée ici
          DRIVER_MAKEFILE="$DRIVER_DIR/Makefile"
          
          echo "[+] Setting up ReSukiSU..."
          git clone https://github.com/ReSukiSU/ReSukiSU KernelSU
          
          cd "$DRIVER_DIR"
          ln -sf "$(realpath --relative-to="$DRIVER_DIR" "$GKI_ROOT/KernelSU/kernel")" "kernelsu"
          
          # Vérification de sécurité pour éviter l'erreur si le Makefile n'existe pas
          if [ -f "$DRIVER_MAKEFILE" ]; then
              grep -q "kernelsu" "$DRIVER_MAKEFILE" || printf "\nobj-\$(CONFIG_KSU) += kernelsu/\n" >> "$DRIVER_MAKEFILE"
          else
              echo "obj-\$(CONFIG_KSU) += kernelsu/" > "$DRIVER_MAKEFILE"
          fi
          EOF
          chmod +x setup_resukisu.sh
          ./setup_resukisu.sh


      - name: Apply Fix-Werror Patch
        run: |
          cat << 'EOF' > fix-werror.patch
          --- a/Makefile
          +++ b/Makefile
          @@ -424,11 +424,9 @@ LINUXINCLUDE    := \
           		$(USERINCLUDE)
           
           KBUILD_AFLAGS   := -D__ASSEMBLY__ -march=armv8-a+lse
          -KBUILD_CFLAGS   := -Wall -Wundef -Wstrict-prototypes -Wno-trigraphs \
          +KBUILD_CFLAGS   := -Wall -Wundef -Wno-trigraphs \
           		   -fno-strict-aliasing -fno-common -fshort-wchar \
          -		   -Werror-implicit-function-declaration \
           		   -Wno-format-security \
          -		   -Werror \
           		   -Xassembler -march=armv8-a+lse \
           		   -std=gnu89
           KBUILD_CPPFLAGS := -D__KERNEL__
          @@ -930,15 +928,9 @@ KBUILD_CFLAGS   += $(call cc-option,-fconserve-stack)
           # disallow errors like 'EXPORT_GPL(foo);' with missing header
           KBUILD_CFLAGS   += $(call cc-option,-Werror=implicit-int)
           
          -# require functions to have arguments in prototypes, not empty 'int foo()'
          -KBUILD_CFLAGS   += $(call cc-option,-Werror=strict-prototypes)
          -
           # Prohibit date/time macros, which would make the build non-deterministic
           KBUILD_CFLAGS   += $(call cc-option,-Werror=date-time)
           
          -# enforce correct pointer usage
          -KBUILD_CFLAGS   += $(call cc-option,-Werror=incompatible-pointer-types)
          -
           # Require designated initializers for all marked structures
           KBUILD_CFLAGS   += $(call cc-option,-Werror=designated-init)
          EOF
          git apply fix-werror.patch

      - name: Build Kernel
        run: |
          make clean && make mrproper
          make ARCH=arm64 vendor/kona-perf_defconfig
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_LKM=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_VDSO32=n"
          } >> arch/arm64/configs/vendor/kona-perf_defconfig
          
          make ARCH=arm64 alldefconfig
          
          # Compilation
          make -j$(nproc) ARCH=arm64 \
            CC=/opt/proton-clang/bin/clang \
            LD=/opt/proton-clang/bin/ld.lld \
            LLVM=1 \
            LLVM_IAS=1 \
            HOSTCC=gcc

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image-Motorola
          path: out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: warn
