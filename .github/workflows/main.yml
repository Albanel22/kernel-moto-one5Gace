name: Build ReSukiSU Kernel - Final Moto Kiev

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Installation des dependances
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libtinfo6 pahole binutils-aarch64-linux-gnu

      - name: Telechargement de Clang (Proton Clang)
        run: |
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace/clang
          # Téléchargement direct d'une version stable de Proton Clang
          git clone --depth=1 https://github.com/kdrag0n/proton-clang $GITHUB_WORKSPACE/kernel_workspace/clang

      - name: Clonage sources kernel
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 $GITHUB_WORKSPACE/kernel_workspace/kernel-src
          
      - name: Injection ReSukiSU
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
          rm -rf drivers/kernelsu
          git clone https://github.com/ReSukiSU/ReSukiSU drivers/kernelsu
          cd drivers/kernelsu && git checkout main && cd ..
          if [ -f "drivers/Makefile" ]; then
            if ! grep -q "obj-\$(CONFIG_KSU) += kernelsu/" drivers/Makefile; then
              echo "obj-\$(CONFIG_KSU) += kernelsu/" >> drivers/Makefile
            fi
          fi

      - name: Compilation du Noyau pour Moto Kiev
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src        
          
          # 1. Nettoyage TOTAL des variables d'environnement de linkage
          # Cela empêche le linker système d'être confus par des chemins d'autres toolchains
          unset LDFLAGS
          unset LD_LIBRARY_PATH
          unset LD
          
          # 2. Préparation des chemins
          CLANG_BIN="$GITHUB_WORKSPACE/kernel_workspace/clang/bin"
          export PATH="$CLANG_BIN:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # 3. Forçage explicite de GCC
          export HOSTCC=gcc
          export HOSTLD=ld
          export HOSTAR=ar
          export HOSTCXX=g++
          
          echo "--- Début de la compilation ---"
          
          # 4. Compilation en deux temps
          make O=out ARCH=arm64 kiev_defconfig
          
          make O=out ARCH=arm64 \
            CC=clang \
            HOSTCC=gcc \
            LLVM=1 LLVM_IAS=1 \
            -j$(nproc) Image.gz

      

      - name: Preparation AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel
          cp kernel-src/arch/arm64/boot/Image.gz AnyKernel/
          
          cd AnyKernel
          cat << 'EOF' > anykernel.sh
          properties() {
          kernel.string=ReSukiSU-Kiev-Final
          do.devicecheck=1
          device.name1=kiev
          do.modules=0
          do.systemless=1
          do.cleanup=1
          }
          block=/dev/block/by-name/boot;
          is_slot_device=auto;
          . tools/ak3-core.sh;
          split_boot;
          flash_boot;
          EOF
          chmod +x anykernel.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-Kernel-Kiev
          path: kernel_workspace/AnyKernel/*
