name: Build ReSukiSU Kernel

on:
  push:
    branches: [ lineage-23.2 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu git gnupg gperf imagemagick libelf-dev liblz4-tool libncurses-dev \
            libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc \
            zip zlib1g-dev libc6-dev-i386 lib32ncurses-dev

      - name: Setup Toolchain
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang /opt/proton-clang

      - name: Build Kernel
        run: |
          echo "--- Liste des dossiers à la racine ---"
          ls -F
          
          # Cherche le dossier qui contient le fichier 'Makefile'
          KERNEL_DIR=$(find . -maxdepth 2 -name Makefile -exec dirname {} \;)
          echo "Dossier trouvé : $KERNEL_DIR"
          
          cd $KERNEL_DIR
          
          echo "--- Début de la compilation dans $KERNEL_DIR ---"
          
          # 1. Nettoyage
          make clean && make mrproper
          
          # 2. Configurer
          make ARCH=arm64 vendor/kona-perf_defconfig
          
          # 3. Compilation
          export PATH=/opt/proton-clang/bin:$PATH
          make -j$(nproc) ARCH=arm64 \
            CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CONFIG_KSU=y



      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image-Kiev
          path: out/arch/arm64/boot/Image.gz-dtb
