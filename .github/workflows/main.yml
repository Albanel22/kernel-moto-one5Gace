name: Build Kernel

on:
  workflow_dispatch:

env:
  KERNEL_REPO: LineageOS/android_kernel_motorola_sm8250
  KERNEL_BRANCH: lineage-23.2
  KERNEL_DEFCONFIG: vendor/kona-perf_defconfig
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3
  RESUKISU_PATCH_URL: https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh
  TOOLCHAIN_URL: https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel-source

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git flex bison build-essential libssl-dev bc binutils-aarch64-linux-gnu gawk
          curl -LSs "${{ env.TOOLCHAIN_URL }}" | tar -xz -C /opt
          echo "PATH=/opt/proton-clang-master/bin:$PATH" >> $GITHUB_ENV

      - name: Patch ReSukiSU
        run: |
          cd kernel-source
          curl -LSs "${{ env.RESUKISU_PATCH_URL }}" > setup.sh
          chmod +x setup.sh
          ./setup.sh

      - name: Build Kernel
        run: |
          cd kernel-source
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Nettoyage profond
          make clean
          make mrproper
          
          # Activation de KernelSU
          echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
          
          # 1. Configuration initiale
          make ${{ env.KERNEL_DEFCONFIG }}
          
          # 2. Le "Hack" ultime : déplacer temporairement le linker LLVM 
          # pour forcer l'usage du 'ld' système (Ubuntu) lors de la création des scripts
          mv /opt/proton-clang-master/bin/ld /opt/proton-clang-master/bin/ld.bak
          
          # Compilation des scripts avec le linker natif
          make scripts HOSTCC=gcc
          
          # Remise en place du linker LLVM pour la compilation du noyau
          mv /opt/proton-clang-master/bin/ld.bak /opt/proton-clang-master/bin/ld
          
          # 3. Compilation finale du noyau AVEC Proton-Clang
          export PATH=/opt/proton-clang-master/bin:$PATH
          make -j$(nproc) CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-w"

      - name: Package Kernel
        run: |
          git clone ${{ env.ANYKERNEL_REPO }} AnyKernel3
          cp kernel-source/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-ReSukiSU-Output
          path: AnyKernel3/*
