name: Build ReSukiSU Kernel - Final Moto Kiev

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Installation des dependances
        run: |
          sudo apt-get update
          # Ajout de gcc-aarch64-linux-gnu pour fournir le linker aarch64
          sudo apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libtinfo6 pahole gcc-aarch64-linux-gnu
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libtinfo6 pahole

      - name: Telechargement de Clang (Toolchain)
        run: |
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b main-kernel-build-2024 clang

      - name: Clonage sources kernel
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 $GITHUB_WORKSPACE/kernel_workspace/kernel-src

      - name: Injection ReSukiSU
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
          
          # Nettoyage
          rm -rf drivers/kernelsu
          
          # Clonage dans le dossier drivers
          git clone https://github.com/ReSukiSU/ReSukiSU drivers/kernelsu
          
          # Retour à la racine pour assurer que nous sommes dans kernel-src
          cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
          
          # Vérification et ajout dans le Makefile des pilotes
          # On vérifie bien que drivers/Makefile existe
          if [ -f "drivers/Makefile" ]; then
            if ! grep -q "obj-\$(CONFIG_KSU) += kernelsu/" drivers/Makefile; then
              echo "obj-\$(CONFIG_KSU) += kernelsu/" >> drivers/Makefile
            fi
          else
            echo "Erreur : drivers/Makefile introuvable dans $(pwd)"
            exit 1
          fi

      - name: Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
          make mrproper
          
          # Configuration environnement
          export PATH="/opt/proton-clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Utilisation du compilateur aarch64 disponible sur le système Ubuntu
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Configuration
          [ -f arch/arm64/configs/vendor/kiev_defconfig ] && DEFCONFIG="vendor/kiev_defconfig" || DEFCONFIG="vendor/lito-perf_defconfig"
          make $DEFCONFIG
          
          # Compilation : On pointe LD vers lld (celui de clang) pour éviter de chercher aarch64-linux-android-ld
          make ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            LLVM=1 LLVM_IAS=1 \
            HOSTCC=gcc HOSTLD=ld \
            -j$(nproc) Image.gz



      - name: Preparation AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel
          cp kernel-src/out/arch/arm64/boot/Image.gz AnyKernel/
          
          cd AnyKernel
          cat << 'EOF' > anykernel.sh
          properties() {
          kernel.string=ReSukiSU-Kiev-Final
          do.devicecheck=1
          device.name1=kiev
          do.modules=0
          do.systemless=1
          do.cleanup=1
          }
          block=/dev/block/by-name/boot;
          is_slot_device=auto;
          . tools/ak3-core.sh;
          split_boot;
          flash_boot;
          EOF
          chmod +x anykernel.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-Kernel-Kiev
          path: kernel_workspace/AnyKernel/*
