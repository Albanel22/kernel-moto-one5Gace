name: Build Custom Android Kernel with KernelSU-Next

on:
  workflow_dispatch: # Permet de lancer la compilation manuellement depuis l'onglet Actions

env:
  # Modifie ces variables si tu as besoin de basculer entre sm8250 ou sm7250 selon tes sources exactes
  KERNEL_REPO: https://github.com/LineageOS/android_kernel_motorola_sm8250
  KERNEL_BRANCH: lineage-23.2
  KERNEL_DEFCONFIG: vendor/kiev_defconfig
  ARCH: arm64
  SUBARCH: arm64

jobs:
  build:
    name: Compilation du Noyau Linux
    runs-on: ubuntu-latest

    steps:
      - name: Configuration de l'espace de travail
        uses: actions/checkout@v4

      - name: Installer les dépendances Linux requis
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5-dev libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: Télécharger le Toolchain (Proton Clang)
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang-toolchain

      - name: Cloner les sources du noyau Motorola
        run: |
          git clone --depth=1 -b $KERNEL_BRANCH $KERNEL_REPO kernel-source

      - name: Intégrer KernelSU-Next (Legacy Branch officiel)
        run: |
          cd kernel-source
          # L'argument 'legacy' force le script officiel à appliquer le code adapté aux anciens noyaux
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Compiler le Noyau
        run: |
          cd kernel-source
          
          # Configuration des variables d'environnement de build
          export PATH=$GITHUB_WORKSPACE/clang-toolchain/bin:$PATH
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          
          # Nettoyage et préparation de la configuration
          make O=out clean
          make O=out mrproper
          make O=out $KERNEL_DEFCONFIG
          
          # Lancement de la compilation sur tous les cœurs disponibles
          make O=out -j$(nproc --all)

      - name: Archiver et Télécharger le Kernel Compilé (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Kiev-KernelSU-Next
          path: |
            kernel-source/out/arch/arm64/boot/Image
            kernel-source/out/arch/arm64/boot/Image.gz
            kernel-source/out/arch/arm64/boot/Image.gz-dtb
            kernel-source/out/arch/arm64/boot/Image-dtb
