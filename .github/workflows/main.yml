name: Build Kernel

on:
  workflow_dispatch:

env:
  KERNEL_REPO: LineageOS/android_kernel_motorola_sm8250
  KERNEL_BRANCH: lineage-23.2
  KERNEL_DEFCONFIG: vendor/kona-perf_defconfig
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3
  RESUKISU_PATCH_URL: https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh
  TOOLCHAIN_URL: https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel-source

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git flex bison build-essential libssl-dev bc binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu gawk
          curl -LSs "${{ env.TOOLCHAIN_URL }}" | tar -xz -C /opt

      - name: Patch ReSukiSU
        run: |
          cd kernel-source
          curl -LSs "${{ env.RESUKISU_PATCH_URL }}" > setup.sh
          chmod +x setup.sh
          ./setup.sh

      - name: Build Kernel
        run: |
          cd kernel-source
          
          # Nettoyage
          make clean
          make mrproper
          
          echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
          
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # 1. Configuration
          make ARCH=arm64 ${{ env.KERNEL_DEFCONFIG }}
          
          # 2. Utilisation des chemins absolus pour garantir l'usage des outils hôtes natifs
          # Cela court-circuite le PATH et empêche l'utilisation de clang pour les scripts
          make ARCH=arm64 scripts HOSTCC=/usr/bin/gcc HOSTLD=/usr/bin/ld
          
          # 3. Compilation finale du noyau (Injection de Proton-Clang ici seulement)
          export PATH=/opt/proton-clang-master/bin:$PATH
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 KCFLAGS="-w"

      - name: Package Kernel
        run: |
          git clone ${{ env.ANYKERNEL_REPO }} AnyKernel3
          cp kernel-source/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-ReSukiSU-Output
          path: AnyKernel3/*
