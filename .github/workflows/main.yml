name: Build ReSukiSU Kernel - Final Kiev

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Installation des dependances
        run: |
          sudo apt update && sudo apt install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libtinfo6 pahole

      - name: Setup Workspace & Toolchain
        run: |
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace
          git clone --depth=1 https://github.com/kdrag0n/proton-clang /opt/proton-clang

      - name: Clonage sources kernel
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 $GITHUB_WORKSPACE/kernel_workspace/kernel-src

      - name: Injection ReSukiSU
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
          git clone https://github.com/ReSukiSU/ReSukiSU KernelSU
          # Installation propre via le script officiel
          cd KernelSU
          git checkout main
          cd ..
          # Création du lien et modification du makefile pour Kiev
          mkdir -p drivers/kernelsu
          ln -sf "$(pwd)/KernelSU/kernel/"* drivers/kernelsu/
          echo "obj-\$(CONFIG_KSU) += kernelsu/" >> drivers/Makefile

      - name: Configuration Materielle et Build
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
          
          # Configuration Kiev
          [ -f arch/arm64/configs/vendor/kiev_defconfig ] && DEFCONFIG="vendor/kiev_defconfig" || DEFCONFIG="vendor/lito-perf_defconfig"
          
          # Application des options de Root et Désactivation des protections "faisant figer le logo"
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_HAVE_KPROBES=y"
            echo "CONFIG_KPROBE_EVENTS=y"
            echo "# CONFIG_CFI_CLANG is not set"
            echo "# CONFIG_CC_WERROR is not set"
          } >> arch/arm64/configs/$DEFCONFIG
          
          # Compilation
          export PATH="/opt/proton-clang/bin:$PATH"
          make O=out ARCH=arm64 $DEFCONFIG
          make O=out ARCH=arm64 \
            CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-w" KBUILD_AFLAGS="-w" \
            HOSTCFLAGS="-w -fcommon" \
            -j$(nproc) Image.gz

      - name: Packaging AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel
          cp kernel-src/out/arch/arm64/boot/Image.gz AnyKernel/
          
          cat << 'EOF' > AnyKernel/anykernel.sh
          properties() {
          kernel.string=ReSukiSU-Kiev-Final
          do.devicecheck=1
          device.name1=kiev
          do.modules=0
          do.systemless=1
          do.cleanup=1
          }
          block=/dev/block/by-name/boot;
          is_slot_device=auto;
          . tools/ak3-core.sh;
          split_boot;
          flash_boot;
          EOF
          chmod +x AnyKernel/anykernel.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-Kernel-Kiev
          path: kernel_workspace/AnyKernel/*
