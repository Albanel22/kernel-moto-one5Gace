name: Build Kernel ReSukiSU + SUSFS - Motorola Kiev

on:
  workflow_dispatch: # Lancement manuel via l'interface GitHub

env:
  KERNEL_REPO: https://github.com/LineageOS/android_kernel_motorola_sm8250.git
  KERNEL_BRANCH: lineage-23.0
  KERNEL_CONFIG: vendor/kiev_defconfig
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3.git
  ANYKERNEL_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Nettoyer et installer les dépendances de compilation
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Télécharger la Toolchain Clang de Google (AOSP)
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang
          cd clang
          git sparse-checkout set clang-r522817
          echo "$(pwd)/clang-r522817/bin" >> $GITHUB_PATH

      - name: Cloner les sources du Kernel Motorola (sm8250 unifié)
        run: |
          git clone ${{ env.KERNEL_REPO }} -b ${{ env.KERNEL_BRANCH }} --depth=1 kernel-source

      - name: Cloner les patchs SUSFS officiels (Branche 4.19)
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19 susfs-source

      - name: Injecter ReSukiSU et appliquer les patchs SUSFS
        run: |
          cd kernel-source
          
          # 1. Injection de ReSukiSU (Kernel-level Root depuis ton lien GitHub)
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s main
          
          # 2. Recherche dynamique des fichiers de patch SUSFS
          echo "Localisation des patchs SUSFS..."
          KERNEL_PATCH_PATH=$(find ../susfs-source/ -name "*add_susfs_in_kernel-4.19*.patch" | head -n 1)
          KSU_PATCH_PATH=$(find ../susfs-source/ -name "*add_susfs_to_ksu*.patch" | head -n 1)
          
          if [ -z "$KERNEL_PATCH_PATH" ] || [ -z "$KSU_PATCH_PATH" ]; then
            echo "Erreur critique : Impossible de trouver les patchs SUSFS requis."
            exit 1
          fi
          
          echo "Patch Noyau trouvé : $KERNEL_PATCH_PATH"
          echo "Patch ReSukiSU trouvé : $KSU_PATCH_PATH"
          
          cp "$KERNEL_PATCH_PATH" ./kernel_susfs.patch
          cp "$KSU_PATCH_PATH" ./KernelSU/ksu_susfs.patch
          
          # 3. Application des patchs
          patch -p1 < kernel_susfs.patch || echo "Patch noyau appliqué avec des lignes ignorées (sans gravité)"
          
          cd KernelSU
          patch -p1 < ksu_susfs.patch || echo "Patch ReSukiSU appliqué"
          cd ..

          # 4. Activation des options requises dans la configuration de votre Motorola (kiev)
          echo "CONFIG_KSU=y" >> arch/arm64/configs/${{ env.KERNEL_CONFIG }}
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/${{ env.KERNEL_CONFIG }}
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> arch/arm64/configs/${{ env.KERNEL_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> arch/arm64/configs/${{ env.KERNEL_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> arch/arm64/configs/${{ env.KERNEL_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> arch/arm64/configs/${{ env.KERNEL_CONFIG }}

      - name: Compiler le Kernel (sm8250 / 4.19)
        run: |
          cd kernel-source
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          
          make O=out ${{ env.KERNEL_CONFIG }}
          make -j$(nproc --all) O=out

      - name: Empaqueter avec AnyKernel3
        run: |
          git clone ${{ env.ANYKERNEL_REPO }} -b ${{ env.ANYKERNEL_BRANCH }} AnyKernel3
          cp kernel-source/out/arch/arm64/boot/Image AnyKernel3/
          
          cd AnyKernel3
          sed -i 's/device.name1=maguro/device.name1=kiev/g' anykernel.sh
          zip -r ../ReSukiSU-SUSFS-Kernel-Kiev.zip *

      - name: Téléverser le ZIP final sur GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-SUSFS-Kernel-Kiev-AnyKernel3
          path: ReSukiSU-SUSFS-Kernel-Kiev.zip
