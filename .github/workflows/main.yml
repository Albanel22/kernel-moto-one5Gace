name: Build ReSukiSU Kernel

on:
  push:
    branches: [ lineage-23.2 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu git gnupg gperf imagemagick libelf-dev liblz4-tool libncurses-dev \
            libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc \
            zip zlib1g-dev libc6-dev-i386 lib32ncurses-dev

      - name: Setup Toolchain
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang /opt/proton-clang

      - name: Build Kernel
        run: |
          # 1. Inspecter le contenu du dossier actuel
          echo "Contenu du dossier actuel :"
          ls -F
          
          # 2. Si le Makefile n'est pas ici, on cherche dans les sous-dossiers
          echo "Recherche du Makefile :"
          find . -name Makefile
          
          # ATTENTION : Une fois que tu auras trouvé où est le Makefile, 
          # tu devras ajouter 'cd nom_du_dossier' ici.
          
          # Pour l'instant, on laisse le reste en commentaire
          # make clean && make mrproper


      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image-Kiev
          path: out/arch/arm64/boot/Image.gz-dtb
