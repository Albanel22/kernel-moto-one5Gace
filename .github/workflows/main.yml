name: Build Kernel ReSukiSU/KSUN - Motorola Kiev

on:
  workflow_dispatch:

env:
  KERNEL_REPO: https://github.com/LineageOS/android_kernel_motorola_sm8250.git
  KERNEL_BRANCH: lineage-23.0
  KERNEL_CONFIG: vendor/kiev_defconfig
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3.git
  ANYKERNEL_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Nettoyer et installer les dépendances de compilation
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi gcc-12-aarch64-linux-gnu gcc-12-arm-linux-gnueabi patch
          
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-12 /usr/bin/aarch64-linux-gnu-gcc
          sudo ln -sf /usr/bin/arm-linux-gnueabi-gcc-12 /usr/bin/arm-linux-gnueabi-gcc

      - name: Télécharger la Toolchain Clang de Google (AOSP)
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang
          cd clang
          git sparse-checkout set clang-r522817
          echo "$(pwd)/clang-r522817/bin" >> $GITHUB_PATH

      - name: Cloner les sources du Kernel Motorola (sm8250 unifié)
        run: |
          git clone ${{ env.KERNEL_REPO }} -b ${{ env.KERNEL_BRANCH }} --depth=1 kernel-source

      - name: Injecter KernelSU-Next, Patch SUSFS et Inline Hooks
        run: |
          cd kernel-source
          
          # 1. Cloner le dépôt KernelSU-Next sous "KernelSU"
          git clone -b legacy https://github.com/wshamroukh/KernelSU-Next-SUSFS-kernelv4.19.git KernelSU
          
          # 2. Créer le lien symbolique interne vers drivers/kernelsu
          ln -sf $(pwd)/KernelSU/kernel drivers/kernelsu

          # Sauvegarder le fichier RCU sain d'origine de Motorola avant le patch
          cp kernel/rcu/update.c kernel/rcu/update.c.bak

          # 3. Récupérer et appliquer le patch officiel SUSFS 4.19 pour le noyau
          curl -LSs "https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.19.patch" -o susfs.patch
          patch -p1 --fuzz=3 < susfs.patch || echo "Certains blocs du patch noyau ont été appliqués avec décalage"

          # RESTAURATION RCU : On remet le fichier RCU d'origine pour détruire le bug de build
          mv kernel/rcu/update.c.bak kernel/rcu/update.c
          echo -e "static inline void rcu_tasks_bootup_oddness(void) {}\nstatic inline void show_rcu_tasks_gp_kthreads(void) {}" > kernel/rcu/tasks.h

          # 4. Télécharger et exécuter le script d'Inline Hooks pour lier SUSFS à KernelSU
          curl -LSs "https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/susfs_inline_hook_patches.sh" -o susfs_inline_hook_patches.sh
          chmod +x susfs_inline_hook_patches.sh
          ./susfs_inline_hook_patches.sh $(pwd)/KernelSU || echo "Application des inline hooks terminée"

          # 5. Lier proprement les fichiers de configuration du noyau
          DRIVER_MAKEFILE="drivers/Makefile"
          DRIVER_KCONFIG="drivers/Kconfig"
          grep -q "kernelsu" "$DRIVER_MAKEFILE" || printf "\nobj-\$(CONFIG_KSU) += kernelsu/\n" >> "$DRIVER_MAKEFILE"
          grep -q "drivers/kernelsu/Kconfig" "$DRIVER_KCONFIG" || sed -i "/endmenu/i\source \"drivers/kernelsu/Kconfig\"" "$DRIVER_KCONFIG"

          # Fix SELinux : On donne tous les chemins possibles à KernelSU
          if [ -f "drivers/kernelsu/Makefile" ]; then
            sed -i '1s|^|ccflags-y += -I$(srctree)/security/selinux -I$(srctree)/security/selinux/include -I$(objtree)/security/selinux/include -I$(objtree)/security/selinux\n|' drivers/kernelsu/Makefile
          fi

          # =====================================================================
          # Correctifs spécifiques résiduels à la base Motorola + SUSFS
          # =====================================================================
          sed -i '1s|^|int alarm_debug = 0;\n|' kernel/time/alarmtimer.c
          sed -i '1s|^|typedef unsigned int compat_uptr_t;\n|' include/linux/filter.h
          
          # Fix E : Définir la constante demandée par SUSFS dans le scheduler de Motorola
          sed -i '1s|^|#define NOHZ_KICK_MASK 0x1\n|' kernel/sched/core.c
          
          # Fix F : Rediriger bpf_stats_handler vers le gestionnaire d'entiers standard
          sed -i '1s|^|#define bpf_stats_handler proc_dointvec\n|' kernel/sysctl.c
          
          if [ -f "drivers/firmware/efi/efi.c" ]; then
            sed -i 's/mmap_sem/mmap_lock/g' drivers/firmware/efi/efi.c
          fi
          # =====================================================================

          # Détection du defconfig Motorola
          CONFIG_TO_USE="${{ env.KERNEL_CONFIG }}"
          if [ ! -f "arch/arm64/configs/$CONFIG_TO_USE" ] && [ -f "arch/arm64/configs/vendor/kiev-perf_defconfig" ]; then
            CONFIG_TO_USE="vendor/kiev-perf_defconfig"
          fi
          
          # Forçage des options via l'outil du noyau
          chmod +x scripts/config
          ./scripts/config --file arch/arm64/configs/$CONFIG_TO_USE --enable CONFIG_KSU
          ./scripts/config --file arch/arm64/configs/$CONFIG_TO_USE --enable CONFIG_KALLSYMS
          ./scripts/config --file arch/arm64/configs/$CONFIG_TO_USE --enable CONFIG_KALLSYMS_ALL
          
          # Activation des options SUSFS
          ./scripts/config --file arch/arm64/configs/$CONFIG_TO_USE --enable CONFIG_SUSFS
          ./scripts/config --file arch/arm64/configs/$CONFIG_TO_USE --enable CONFIG_SUSFS_SUS_PATH
          ./scripts/config --file arch/arm64/configs/$CONFIG_TO_USE --enable CONFIG_SUSFS_SUS_MOUNT
          ./scripts/config --file arch/arm64/configs/$CONFIG_TO_USE --enable CONFIG_SUSFS_TRY_UMOUNT
          
          # Mode Manual Hook para Non-GKI 4.19
          ./scripts/config --file arch/arm64/configs/$CONFIG_TO_USE --disable CONFIG_KSU_TRACEPOINT_HOOK
          ./scripts/config --file arch/arm64/configs/$CONFIG_TO_USE --enable CONFIG_KSU_MANUAL_HOOK
          ./scripts/config --file arch/arm64/configs/$CONFIG_TO_USE --enable CONFIG_KSU_MANUAL_HOOK_AUTO_SETUID_HOOK
          ./scripts/config --file arch/arm64/configs/$CONFIG_TO_USE --enable CONFIG_KSU_MANUAL_HOOK_AUTO_INITRC_HOOK
          ./scripts/config --file arch/arm64/configs/$CONFIG_TO_USE --enable CONFIG_KSU_MANUAL_HOOK_AUTO_INPUT_HOOK

      - name: Compiler le Kernel (sm8250 / 4.19)
        run: |
          cd kernel-source
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CC=clang
          
          CONFIG_TO_USE="${{ env.KERNEL_CONFIG }}"
          if [ ! -f "arch/arm64/configs/$CONFIG_TO_USE" ] && [ -f "arch/arm64/configs/vendor/kiev-perf_defconfig" ]; then
            CONFIG_TO_USE="vendor/kiev-perf_defconfig"
          fi
          
          make O=out $CONFIG_TO_USE
          make O=out olddefconfig
          make O=out prepare
          
          # =====================================================================
          # ⚔️ COMPILATION MANUELLE DE L'OUTIL ET DES EN-TÊTES SELINUX
          # =====================================================================
          mkdir -p out/security/selinux/include
          # On compile localement l'outil générateur d'en-têtes (mdp) de Linux
          gcc -Isecurity/selinux/include scripts/selinux/mdp/mdp.c -o out/mdp
          # On lui fait cracher flask.h et av_permissions.h directement là où Kbuild les attend !
          ./out/mdp security/selinux/policy_capabilities out/security/selinux/include
          # Copie de secours dans l'arborescence racine au cas où
          cp out/security/selinux/include/*.h security/selinux/include/ 2>/dev/null || true
          # =====================================================================
          
          # Lancement de la compilation globale
          make -j$(nproc --all) O=out KCFLAGS="-w" || make O=out KCFLAGS="-w"

      - name: Empaqueter avec AnyKernel3
        run: |
          git clone ${{ env.ANYKERNEL_REPO }} -b ${{ env.ANYKERNEL_BRANCH }} AnyKernel3
          cp kernel-source/out/arch/arm64/boot/Image AnyKernel3/
          
          cd AnyKernel3
          sed -i 's/device.name1=maguro/device.name1=kiev/g' anykernel.sh
          zip -r ../ReSukiSU-Kernel-Kiev.zip *

      - name: Téléverser le ZIP final sur GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-Kernel-Kiev-AnyKernel3
          path: ReSukiSU-Kernel-Kiev.zip
