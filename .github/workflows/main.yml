name: Build ReSukiSU Kernel

on:
  push:
    branches: [ lineage-23.2 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_kernel_motorola_sm8250'
          ref: 'lineage-23.2'
          submodules: 'recursive'

      - name: Setup Build Environment
        run: |
          sudo apt update && sudo apt install -y git device-tree-compiler lz4 xz-utils zlib1g-dev \
            openjdk-17-jdk gcc g++ python3 python-is-python3 p7zip-full android-sdk-libsparse-utils \
            erofs-utils default-jdk gnupg flex bison gperf build-essential zip curl libc6-dev \
            libncurses-dev libx11-dev libreadline-dev libgl1 libgl1-mesa-dev make bc grep \
            tofrodos python3-markdown libxml2-utils xsltproc libc6-dev libtinfo6 repo cpio \
            kmod openssl libelf-dev pahole libssl-dev libarchive-tools zstd rsync

      - name: Setup Toolchain
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang /opt/proton-clang

      - name: Apply Fix-Werror Manually
        run: |
          # Suppression de Werror et des warnings stricts dans le Makefile racine
          # Utilisation de sed pour commenter ou supprimer les lignes problématiques
          sed -i 's/-Werror-implicit-function-declaration//g' Makefile
          sed -i 's/-Werror//g' Makefile
          sed -i '/call cc-option,-Werror=strict-prototypes/d' Makefile
          sed -i '/call cc-option,-Werror=incompatible-pointer-types/d' Makefile
          
          # Force le retrait du Werror dans la définition de KBUILD_CFLAGS
          # On remplace la ligne longue par une version allégée
          sed -i 's/KBUILD_CFLAGS   := -Wall -Wundef -Wstrict-prototypes -Wno-trigraphs/KBUILD_CFLAGS   := -Wall -Wundef -Wno-trigraphs/g' Makefile
          
          echo "Makefile patché avec succès par injection directe."

      - name: Inject and Setup ReSukiSU
        run: |
          cat << 'EOF' > setup_resukisu.sh
          #!/bin/sh
          set -eu
          DRIVER_DIR="$(pwd)/drivers"
          DRIVER_MAKEFILE="$DRIVER_DIR/Makefile"
          git clone https://github.com/ReSukiSU/ReSukiSU KernelSU
          cd "$DRIVER_DIR"
          ln -sf "$(realpath --relative-to="$DRIVER_DIR" "$(pwd)/../KernelSU/kernel")" "kernelsu"
          grep -q "kernelsu" "$DRIVER_MAKEFILE" || printf "\nobj-\$(CONFIG_KSU) += kernelsu/\n" >> "$DRIVER_MAKEFILE"
          EOF
          chmod +x setup_resukisu.sh
          ./setup_resukisu.sh

      - name: Build Kernel
        run: |
          # 1. Nettoyage complet pour effacer les traces des sed précédents
          make clean && make mrproper
          
          # 2. Configuration
          make ARCH=arm64 vendor/kona-perf_defconfig
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_LKM=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_VDSO32=n"
          } >> arch/arm64/configs/vendor/kona-perf_defconfig
          
          make ARCH=arm64 alldefconfig
          
          # 3. Compilation avec contournement des warnings sans modifier le Makefile
          # On utilise KCFLAGS pour injecter les flags sans risquer de corrompre le fichier
          make -j$(nproc) ARCH=arm64 \
            CC=/opt/proton-clang/bin/clang \
            LD=/opt/proton-clang/bin/ld.lld \
            LLVM=1 \
            LLVM_IAS=1 \
            HOSTCC=gcc \
            HOSTCXX=g++ \
            KCFLAGS="-w"

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image-Motorola
          path: out/arch/arm64/boot/Image.gz-dtb
